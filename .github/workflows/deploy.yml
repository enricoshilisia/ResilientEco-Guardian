name: ResilientEco Guardian - CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AZURE_WEBAPP_NAME: resilienteco-guardian-app
  PYTHON_VERSION: '3.12'

jobs:
  # ─── JOB 1: TEST ────────────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --pre -r requirements.txt
    - name: Run Django checks and tests
      env:
        AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
        AZURE_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
        FOUNDRY_DEPLOYMENT: ${{ secrets.FOUNDRY_DEPLOYMENT }}
        AZURE_AI_PROJECT_ENDPOINT: ${{ secrets.AZURE_AI_PROJECT_ENDPOINT }}
        AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        VISUAL_CROSSING_KEY: ${{ secrets.VISUAL_CROSSING_KEY }}
      run: |
        python manage.py check
        python manage.py test guardian --verbosity=2

  # ─── JOB 2: SECURITY SCAN ───────────────────────────────────────
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - run: pip install bandit safety
    - run: bandit -r guardian/ -f json -o bandit-report.json || true
    - run: safety check --full-report || true
    - uses: actions/upload-artifact@v4
      with:
        name: security-report
        path: bandit-report.json

  # ─── JOB 3: BUILD ───────────────────────────────────────────────
  build:
    name: 🔨 Build & Package
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies & collect static files
      env:
        AZURE_OPENAI_ENDPOINT: placeholder
        AZURE_OPENAI_KEY: placeholder
        FOUNDRY_DEPLOYMENT: placeholder
        AZURE_AI_PROJECT_ENDPOINT: placeholder
        DJANGO_SETTINGS_MODULE: resilienteco.settings
      run: |
        python -m pip install --upgrade pip
        pip install --pre -r requirements.txt
        python manage.py collectstatic --noinput || true

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-build
        path: |
          .
          !antenv/**
          !antenv.tar.gz

  # ─── JOB 4: DEPLOY ──────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: app-build

    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

    - name: Stop Azure Web App (clear deployment locks)
      uses: azure/CLI@v1
      with:
        inlineScript: |
          echo "Stopping app to clear any deployment locks..."
          az webapp stop \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group rg-resilienteco-guardian
          echo "Waiting 15s for app to fully stop..."
          sleep 15

    - name: Configure Azure App Settings and Startup Command
      uses: azure/CLI@v1
      with:
        inlineScript: |
          az webapp config set \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group rg-resilienteco-guardian \
            --startup-file "bash /home/site/wwwroot/startup.sh"

          az webapp config appsettings set \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group rg-resilienteco-guardian \
            --settings \
              SCM_DO_BUILD_DURING_DEPLOYMENT=true \
              ENABLE_ORYX_BUILD=true \
              WEBSITE_RUN_FROM_PACKAGE=0

    - name: Deploy to Azure Web App (attempt 1)
      id: deploy1
      continue-on-error: true
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        package: .

    - name: Wait and retry if attempt 1 failed
      if: steps.deploy1.outcome == 'failure'
      run: |
        echo "Attempt 1 failed (409 conflict). Waiting 30s before retry..."
        sleep 30

    - name: Deploy to Azure Web App (attempt 2)
      id: deploy2
      if: steps.deploy1.outcome == 'failure'
      continue-on-error: true
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        package: .

    - name: Wait and retry if attempt 2 failed
      if: steps.deploy2.outcome == 'failure'
      run: |
        echo "Attempt 2 failed. Waiting 60s before final retry..."
        sleep 60

    - name: Deploy to Azure Web App (attempt 3 - final)
      if: steps.deploy2.outcome == 'failure'
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        package: .

    - name: Start Azure Web App
      if: always()
      uses: azure/CLI@v1
      with:
        inlineScript: |
          echo "Starting app..."
          az webapp start \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group rg-resilienteco-guardian
          echo "App started successfully."

    - name: Post-deployment health check
      run: |
        echo "Waiting 90s for app to boot..."
        sleep 90
        curl -f https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/ || echo "Health check failed - check Azure logs"