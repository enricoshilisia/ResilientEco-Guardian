name: ResilientEco Guardian - CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AZURE_WEBAPP_NAME: resilienteco-guardian-app
  PYTHON_VERSION: '3.12'

jobs:
  # ─── JOB 1: TEST ────────────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --pre -r requirements.txt
    - name: Run Django checks and tests
      env:
        AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
        AZURE_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
        FOUNDRY_DEPLOYMENT: ${{ secrets.FOUNDRY_DEPLOYMENT }}
        AZURE_AI_PROJECT_ENDPOINT: ${{ secrets.AZURE_AI_PROJECT_ENDPOINT }}
        AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        VISUAL_CROSSING_KEY: ${{ secrets.VISUAL_CROSSING_KEY }}
      run: |
        python manage.py check
        python manage.py test guardian --verbosity=2

  # ─── JOB 2: SECURITY SCAN ───────────────────────────────────────
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - run: pip install bandit safety
    - run: bandit -r guardian/ -f json -o bandit-report.json || true
    - run: safety check --full-report || true
    - uses: actions/upload-artifact@v4
      with:
        name: security-report
        path: bandit-report.json

  # ─── JOB 3: BUILD ───────────────────────────────────────────────
  build:
    name: 🔨 Build & Package
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Create virtual environment and install dependencies
      run: |
        python -m venv antenv
        source antenv/bin/activate
        python -m pip install --upgrade pip
        pip install --pre -r requirements.txt

    - name: Collect static files
      env:
        AZURE_OPENAI_ENDPOINT: placeholder
        AZURE_OPENAI_KEY: placeholder
        FOUNDRY_DEPLOYMENT: placeholder
        AZURE_AI_PROJECT_ENDPOINT: placeholder
        DJANGO_SETTINGS_MODULE: resilienteco.settings
      run: |
        source antenv/bin/activate
        python manage.py collectstatic --noinput || true

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-build
        path: |
          .
          !antenv/**/__pycache__/*
          !antenv/**/pip*
          !antenv/**/setuptools*
          !antenv/**/dist-info/*
          !antenv/**/wheel*

  # ─── JOB 4: DEPLOY ──────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: app-build

    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

    - name: Configure Azure App Settings
      uses: azure/CLI@v1
      with:
        inlineScript: |
          az webapp config appsettings set \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group rg-resilienteco-guardian \
            --settings \
              SCM_DO_BUILD_DURING_DEPLOYMENT=false \
              WEBSITE_RUN_FROM_PACKAGE=0 \
              ENABLE_ORYX_BUILD=false \
              WEBSITES_PORT=8181

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        package: .
        startup-command: "bash /home/site/wwwroot/startup.sh"

    - name: Post-deployment health check
      run: |
        sleep 60
        curl -f https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/ || echo "Health check failed"